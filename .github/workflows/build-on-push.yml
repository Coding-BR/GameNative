name: Build APK on Push

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'keyvalues/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Inject credentials
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          STEAMGRIDDB_API_KEY: ${{ secrets.STEAMGRIDDB_API_KEY }}
          CLOUD_PROJECT_NUMBER: ${{ secrets.CLOUD_PROJECT_NUMBER }}
        run: |
          cat <<EOF > local.properties
          POSTHOG_API_KEY=${POSTHOG_API_KEY:-dummy}
          POSTHOG_HOST=${POSTHOG_HOST:-https://us.i.posthog.com}
          STEAMGRIDDB_API_KEY=${STEAMGRIDDB_API_KEY:-dummy}
          CLOUD_PROJECT_NUMBER=${CLOUD_PROJECT_NUMBER:-0}
          EOF

      - name: Install Android SDK Build Tools
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --install "build-tools;34.0.0" --sdk_root="$ANDROID_HOME" 2>/dev/null || true

      - name: Build Legacy Debug APK
        run: ./gradlew :app:assembleLegacyDebug --no-daemon --stacktrace

      - name: Build Modern Debug APK
        run: ./gradlew :app:assembleModernDebug --no-daemon --stacktrace

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload Legacy Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GameNative-legacy-debug-${{ steps.vars.outputs.sha_short }}
          path: app/build/outputs/apk/legacy/debug/app-legacy-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Modern Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GameNative-modern-debug-${{ steps.vars.outputs.sha_short }}
          path: app/build/outputs/apk/modern/debug/app-modern-debug.apk
          if-no-files-found: error
          retention-days: 14
